# Based on https://grafana.com/docs/loki/latest/configure/examples/configuration-examples/

auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
  - from: 2020-05-15
    store: tsdb
    object_store: filesystem
    schema: v13
    index:
      prefix: index_
      period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: false
  otlp_config:
    resource_attributes:
      attributes_config:
      - action: index_label
        attributes:
        - oxide.host
        - operation_id
        - actor_kind
        - actor_silo_user_id
