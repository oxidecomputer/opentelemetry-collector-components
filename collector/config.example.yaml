receivers:
  oxideauditlogs:
    collection_interval: 60s
    initial_lookback: 1h
    cursor_path: /var/lib/otelcol/audit_cursor.json

  oxide:
    # Note: uncomment to configure Oxide API authentication. By default, the
    # collector uses the $OXIDE_{PROFILE,HOST,TOKEN} environment variables.
    # host: ${env:OXIDE_HOST}
    # token: ${env:OXIDE_TOKEN}
    metric_patterns:
    - hardware_component:.*
    - http_service:.*
    - instance_network_interface:.*
    - virtual_disk:.*
    - virtual_machine:.*
    add_labels: true
    add_utilization_metrics: true
    collection_interval: 60s

processors:
  batch:
  # Keep log batches small to stay within Loki's request size limit.
  batch/logs:
    send_batch_size: 1000
    send_batch_max_size: 1000

  # Promote audit log fields to resource attributes so Loki can index them.
  transform/promote-attrs:
    log_statements:
    - context: log
      statements:
      - set(resource.attributes["operation_id"], body["operation_id"])
      - set(resource.attributes["actor_kind"], body["actor"]["kind"])
      - set(resource.attributes["actor_silo_user_id"], body["actor"]["kind"]) where body["actor"]["silo_user_id"] == nil
      - set(resource.attributes["actor_silo_user_id"], body["actor"]["silo_user_id"]) where body["actor"]["silo_user_id"] != nil

exporters:
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:9091"
    translation_strategy: UnderscoreEscapingWithoutSuffixes
    resource_to_telemetry_conversion:
      enabled: true

service:
  telemetry:
    metrics:
      level: detailed
      readers:
      - pull:
          exporter:
            prometheus:
              host: 0.0.0.0
              port: 8888

  pipelines:
    metrics:
      receivers: [oxide]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [oxideauditlogs]
      processors: [transform/promote-attrs, batch/logs]
      exporters: [otlp_http/loki]
